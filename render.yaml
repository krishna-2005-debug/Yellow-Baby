services:
  - type: web
    name: yellow-baby-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn yellow_baby_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "yellow-baby-backend.onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
      - key: OTP_DEV_BYPASS
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: yellow-baby-db
          property: connectionString

databases:
  - name: yellow-baby-db
    databaseName: yellow_baby
    user: yellow_baby_user
