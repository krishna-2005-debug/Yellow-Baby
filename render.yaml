services:
  - type: web
    name: yellow-baby-backend
    env: python
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: gunicorn yellow_baby_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "yellow-baby.onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
      - key: OTP_DEV_BYPASS
        value: "False"
      - key: DJANGO_SUPERUSER_PHONE
        value: "9999999999"          # ← Change this in Render dashboard!
      - key: DJANGO_SUPERUSER_PASSWORD
        value: "Admin@1234"          # ← Change this in Render dashboard!
      - key: DJANGO_SUPERUSER_NAME
        value: "Admin"
      - key: DATABASE_URL
        fromDatabase:
          name: yellow-baby-db
          property: connectionString
      # ── Payment Gateway (Razorpay) ──────────────────────────────────
      - key: RAZORPAY_KEY_ID
        value: ""        # ⚠ Set in Render dashboard
      - key: RAZORPAY_KEY_SECRET
        value: ""        # ⚠ Set in Render dashboard
      # ── SMS Gateway (Fast2SMS) ──────────────────────────────────────
      - key: FAST2SMS_API_KEY
        value: ""        # ⚠ Set in Render dashboard

databases:
  - name: yellow-baby-db
    databaseName: yellow_baby
    user: yellow_baby_user
